openapi: 3.0.3
info:
  title: Histolink API
  version: 1.0.0
  description: Documentacion automatica de la API del sistema clinico Histolink.
paths:
  /api/admin/backup/completo/:
    post:
      operationId: api_admin_backup_completo_create
      description: |-
        POST /api/admin/backup/completo/
        Ejecuta Django dumpdata y devuelve el archivo JSON. Solo superadmin.
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/admin/backup/exportar-tenant/:
    post:
      operationId: api_admin_backup_exportar_tenant_create
      description: |-
        POST /api/admin/backup/exportar-tenant/
        Genera un archivo JSON con los datos clínicos del tenant del usuario autenticado.
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/admin/backup/gestiones/:
    get:
      operationId: api_admin_backup_gestiones_retrieve
      description: |-
        GET  /api/admin/backup/gestiones/          — lista gestiones del tenant
        POST /api/admin/backup/gestiones/          — crea gestión
        POST /api/admin/backup/gestiones/<pk>/congelar/    — congela
        POST /api/admin/backup/gestiones/<pk>/descongelar/ — descongela
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
    post:
      operationId: api_admin_backup_gestiones_create
      description: |-
        GET  /api/admin/backup/gestiones/          — lista gestiones del tenant
        POST /api/admin/backup/gestiones/          — crea gestión
        POST /api/admin/backup/gestiones/<pk>/congelar/    — congela
        POST /api/admin/backup/gestiones/<pk>/descongelar/ — descongela
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '201':
          description: No response body
  /api/admin/backup/gestiones/{id}/congelar/:
    post:
      operationId: api_admin_backup_gestiones_congelar_create
      description: |-
        GET  /api/admin/backup/gestiones/          — lista gestiones del tenant
        POST /api/admin/backup/gestiones/          — crea gestión
        POST /api/admin/backup/gestiones/<pk>/congelar/    — congela
        POST /api/admin/backup/gestiones/<pk>/descongelar/ — descongela
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/admin/backup/gestiones/{id}/descongelar/:
    post:
      operationId: api_admin_backup_gestiones_descongelar_create
      description: |-
        GET  /api/admin/backup/gestiones/          — lista gestiones del tenant
        POST /api/admin/backup/gestiones/          — crea gestión
        POST /api/admin/backup/gestiones/<pk>/congelar/    — congela
        POST /api/admin/backup/gestiones/<pk>/descongelar/ — descongela
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/admin/backup/restore/:
    post:
      operationId: api_admin_backup_restore_create
      description: |-
        POST /api/admin/backup/restore/
        Recibe un archivo JSON y ejecuta Django loaddata.
        Accesible por Director, Administrativo y superadmin.
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/antecedentes/{paciente_id}/antecedentes/:
    get:
      operationId: api_antecedentes_antecedentes_retrieve
      description: |-
        GET  /api/pacientes/{paciente_id}/antecedentes/
            Devuelve el antecedente del paciente.
            Respuesta cacheada en Redis DB1 durante 15 minutos.
            Si el paciente no tiene antecedente aún, crea uno vacío.

        PATCH /api/pacientes/{paciente_id}/antecedentes/
            Actualización parcial del antecedente.
            Solo se modifican los campos incluidos en el body.
            Invalida la entrada de caché tras guardar.
      parameters:
      - in: path
        name: paciente_id
        schema:
          type: integer
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
    patch:
      operationId: api_antecedentes_antecedentes_partial_update
      description: |-
        GET  /api/pacientes/{paciente_id}/antecedentes/
            Devuelve el antecedente del paciente.
            Respuesta cacheada en Redis DB1 durante 15 minutos.
            Si el paciente no tiene antecedente aún, crea uno vacío.

        PATCH /api/pacientes/{paciente_id}/antecedentes/
            Actualización parcial del antecedente.
            Solo se modifican los campos incluidos en el body.
            Invalida la entrada de caché tras guardar.
      parameters:
      - in: path
        name: paciente_id
        schema:
          type: integer
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/auditoria/:
    get:
      operationId: api_auditoria_list
      description: |-
        GET /api/auditoria/
        Filtros: ?usuario=&accion=&modulo=&fecha_desde=&fecha_hasta=&ordering=
        Roles: Auditor, Director, Administrativo, superadmin.
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedRegistroAuditoriaList'
          description: ''
  /api/auth/change-password/:
    put:
      operationId: api_auth_change_password_update
      description: |-
        PUT /api/auth/change-password/

        Cambia la contraseña del usuario autenticado.
        Requiere Bearer token.

        Body:
            old_password, new_password, new_password_confirm

        Response 200:
            { message: "Contraseña actualizada exitosamente." }
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/auth/forgot-password/:
    post:
      operationId: api_auth_forgot_password_create
      description: |-
        POST /api/auth/forgot-password/

        Genera un código de 6 dígitos y lo envía al email del usuario.
        La respuesta es siempre la misma (no revela si el email existe).

        Body:
            email (string)

        Response 200:
            { detail: "Si el correo..." }
      tags:
      - api
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/auth/login/:
    post:
      operationId: api_auth_login_create
      description: |-
        POST /api/auth/login/

        Autenticación con username + password.
        Retorna access token, refresh token, y datos del usuario.

        Body:
            username, password

        Response 200:
            { access, refresh, user: { id, username, email, groups, ... } }

        Response 429 (demasiados intentos fallidos desde esta IP):
            { detail, retry_after }; cabecera Retry-After (segundos).
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPairRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPairRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPairRequest'
        required: true
      responses:
        '200':
          description: No response body
  /api/auth/logout/:
    post:
      operationId: api_auth_logout_create
      description: |-
        POST /api/auth/logout/

        Invalida el refresh token (lo agrega a token_blacklist_blacklistedtoken).
        El access token sigue válido hasta su expiración natural (15 min).

        Body:
            refresh (string — el refresh token JWT)

        Response 200:
            { message: "Sesión cerrada exitosamente." }
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/auth/profile/:
    get:
      operationId: api_auth_profile_retrieve
      description: |-
        GET /api/auth/profile/

        Retorna el perfil del usuario autenticado.
        Requiere Bearer token en el header Authorization.

        Response 200:
            { id, username, email, first_name, last_name, is_active,
              is_staff, date_joined, last_login, groups: [...] }
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/auth/register/:
    post:
      operationId: api_auth_register_create
      description: |-
        POST /api/auth/register/

        Registra un nuevo usuario en auth_user.
        No requiere autenticación (AllowAny).

        Body:
            username, email, password, password_confirm
            first_name (optional), last_name (optional)

        Response 201:
            { message, user: { id, username, email, ... } }
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Register'
          description: ''
  /api/auth/reset-password/:
    post:
      operationId: api_auth_reset_password_create
      description: |-
        POST /api/auth/reset-password/

        Valida el código enviado por email y cambia la contraseña.

        Body:
            email, code (6 dígitos), new_password, new_password_confirm

        Response 200:
            { detail: "Contraseña actualizada exitosamente." }

        Response 400:
            { error: "Código inválido o expirado." }
      tags:
      - api
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/auth/token/:
    post:
      operationId: api_auth_token_create
      description: |-
        Takes a set of user credentials and returns an access and refresh JSON web
        token pair to prove the authentication of those credentials.
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenObtainPairRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenObtainPairRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenObtainPairRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenObtainPair'
          description: ''
  /api/auth/token/blacklist/:
    post:
      operationId: api_auth_token_blacklist_create
      description: |-
        Takes a token and blacklists it. Must be used with the
        `rest_framework_simplejwt.token_blacklist` app installed.
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenBlacklistRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenBlacklistRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenBlacklistRequest'
        required: true
      responses:
        '200':
          description: No response body
  /api/auth/token/refresh/:
    post:
      operationId: api_auth_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/auth/token/verify/:
    post:
      operationId: api_auth_token_verify_create
      description: |-
        Takes a token and indicates if it is valid.  This view provides no
        information about a token's fitness for a particular use.
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenVerifyRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenVerifyRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenVerifyRequest'
        required: true
      responses:
        '200':
          description: No response body
  /api/blockchain/documento/{documento_id}/verificar/:
    get:
      operationId: api_blockchain_documento_verificar_retrieve
      description: |-
        T007 — Verifica la integridad de una consulta médica contra blockchain.
        Recalcula el SHA-256 del documento actual y lo compara con el hash
        anclado en el bloque de firma. Devuelve VÁLIDO o ALTERADO.
      parameters:
      - in: path
        name: documento_id
        schema:
          type: integer
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/blockchain/eventos/:
    get:
      operationId: api_blockchain_eventos_retrieve
      description: |-
        GET /api/blockchain/eventos/
        Lista todos los eventos de la blockchain del tenant.
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/blockchain/identidad/:
    get:
      operationId: api_blockchain_identidad_retrieve
      description: |-
        GET /api/blockchain/identidad/
        Devuelve la identidad blockchain del usuario autenticado.
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/blockchain/identidad/registrar/:
    post:
      operationId: api_blockchain_identidad_registrar_create
      description: |-
        POST /api/blockchain/identidad/registrar/
        Genera claves RSA y DID para un usuario y lo registra en la blockchain.
        Solo Admin puede hacerlo.
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/blockchain/personal/:
    get:
      operationId: api_blockchain_personal_retrieve
      description: |-
        GET /api/blockchain/personal/
        Lista el personal de salud con su estado de identidad blockchain.
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/blockchain/verificar-cadena/:
    get:
      operationId: api_blockchain_verificar_cadena_retrieve
      description: |-
        GET /api/blockchain/verificar-cadena/
        Verifica que toda la cadena de bloques esté íntegra.
        Solo Admin puede hacerlo.
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/blockchain/verificar-rol/{usuario_id}/:
    get:
      operationId: api_blockchain_verificar_rol_retrieve
      description: |-
        GET /api/blockchain/verificar-rol/{usuario_id}/
        Contrasta el rol local del usuario con el registro en blockchain.
        Si hay alteración, suspende la cuenta automáticamente.
      parameters:
      - in: path
        name: usuario_id
        schema:
          type: integer
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/clinica/recetas/:
    get:
      operationId: api_clinica_recetas_list
      description: ViewSet de Receta con acciones de dispensación y anulación.
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Receta'
          description: ''
    post:
      operationId: api_clinica_recetas_create
      description: ViewSet de Receta con acciones de dispensación y anulación.
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecetaRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RecetaRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RecetaRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Receta'
          description: ''
  /api/clinica/recetas/{id}/:
    get:
      operationId: api_clinica_recetas_retrieve
      description: ViewSet de Receta con acciones de dispensación y anulación.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Receta.
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Receta'
          description: ''
    put:
      operationId: api_clinica_recetas_update
      description: ViewSet de Receta con acciones de dispensación y anulación.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Receta.
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecetaRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RecetaRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RecetaRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Receta'
          description: ''
    patch:
      operationId: api_clinica_recetas_partial_update
      description: ViewSet de Receta con acciones de dispensación y anulación.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Receta.
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedRecetaRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedRecetaRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedRecetaRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Receta'
          description: ''
    delete:
      operationId: api_clinica_recetas_destroy
      description: ViewSet de Receta con acciones de dispensación y anulación.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Receta.
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/clinica/recetas/{id}/anular/:
    patch:
      operationId: api_clinica_recetas_anular_partial_update
      description: |-
        PATCH /api/clinica/recetas/{id}/anular/

        Reglas:
        - No se puede anular una receta DISPENSADA.
        - Puede anular: médico creador, Admin/Director o superuser.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Receta.
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedRecetaRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedRecetaRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedRecetaRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Receta'
          description: ''
  /api/clinica/recetas/{id}/dispensar/:
    patch:
      operationId: api_clinica_recetas_dispensar_partial_update
      description: |-
        PATCH /api/clinica/recetas/{id}/dispensar/ — solo rol Farmacia.

        Marca la receta como DISPENSADA. La receta debe estar en estado EMITIDA;
        si ya fue dispensada o anulada devuelve 400.
        Registra dispensada_por y fecha_dispensacion.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Receta.
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedRecetaRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedRecetaRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedRecetaRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Receta'
          description: ''
  /api/consentimientos/:
    get:
      operationId: api_consentimientos_list
      description: API para el registro y consulta de consentimientos informados.
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Consentimiento'
          description: ''
    post:
      operationId: api_consentimientos_create
      description: API para el registro y consulta de consentimientos informados.
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConsentimientoRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ConsentimientoRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ConsentimientoRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Consentimiento'
          description: ''
  /api/consentimientos/{id}/:
    get:
      operationId: api_consentimientos_retrieve
      description: API para el registro y consulta de consentimientos informados.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Consentimiento.
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Consentimiento'
          description: ''
    put:
      operationId: api_consentimientos_update
      description: API para el registro y consulta de consentimientos informados.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Consentimiento.
        required: true
      tags:
      - api
      requestBody:
        content:
