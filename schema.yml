    get:
      operationId: api_reportes_produccion_retrieve
      description: Genera reportes de produccion con filtros manuales o busqueda inteligente
        por q. Puede devolver JSON o exportar el mismo reporte en CSV, Excel o PDF.
      summary: Reporte de produccion
      parameters:
      - in: query
        name: codigo_cie10
        schema:
          type: string
        description: Codigo diagnostico CIE-10.
      - in: query
        name: fecha_desde
        schema:
          type: string
          format: date
        description: Fecha inicial YYYY-MM-DD.
      - in: query
        name: fecha_hasta
        schema:
          type: string
          format: date
        description: Fecha final YYYY-MM-DD.
      - in: query
        name: formato
        schema:
          type: string
        description: json, csv, excel o pdf.
      - in: query
        name: medico_id
        schema:
          type: integer
        description: ID del medico.
      - in: query
        name: medico_nombre
        schema:
          type: string
        description: Nombre o apellido del medico.
      - in: query
        name: nivel_urgencia
        schema:
          type: string
        description: 'Nivel de urgencia: ROJO, NARANJA, AMARILLO, VERDE o AZUL.'
      - in: query
        name: q
        schema:
          type: string
        description: Texto libre interpretado por NLP.
      - in: query
        name: tipo_reporte
        schema:
          type: string
        description: resumen_general, consultas, triajes, recetas_emitidas, recetas_dispensadas
          o recetas_anuladas.
      tags:
      - Reportes
      security:
      - jwtAuth: []
      responses:
        '200':
          description: Reporte JSON o archivo exportado segun formato.
        '400':
          description: Filtros invalidos, por ejemplo fecha_desde mayor a fecha_hasta.
        '401':
          description: Token JWT faltante o invalido.
