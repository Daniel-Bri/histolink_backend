          type: integer
          maximum: 300
          minimum: 40
          nullable: true
          title: Presión sistólica (mmHg)
          description: 'Número de arriba en la presión arterial. Rango válido: 40
            – 300 mmHg.'
        presion_diastolica:
          type: integer
          maximum: 200
          minimum: 20
          nullable: true
          title: Presión diastólica (mmHg)
          description: 'Número de abajo en la presión arterial. Rango válido: 20 –
            200 mmHg.'
        temperatura_celsius:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,1})?$
          nullable: true
          title: Temperatura (°C)
          description: 'Temperatura corporal en grados Celsius. Rango válido: 25 –
            45 °C.'
        saturacion_oxigeno:
          type: integer
          maximum: 100
          minimum: 50
          nullable: true
          title: Saturación de oxígeno (SpO2 %)
          description: 'Saturación de oxígeno en sangre. Rango válido: 50 – 100 %.
