    DetalleReceta:
      type: object
      description: Serializer para cada medicamento de la receta.
      properties:
        id:
          type: integer
          readOnly: true
        medicamento:
          type: string
          description: 'Nombre genérico DCI del medicamento. Ej: Amoxicilina, Ibuprofeno.
            No usar marcas comerciales.'
          maxLength: 200
        concentracion:
          type: string
          title: Concentración
          description: 'Concentración del medicamento. Ej: 500mg, 250mg/5ml, 10mg/ml.'
          maxLength: 50
        forma_farmaceutica:
          type: string
