    Consulta:
      type: object
      description: Serializer clínico completo para consulta SOAP.
      properties:
        id:
          type: integer
          readOnly: true
        ficha:
          type: integer
          description: Ficha clínica bajo la cual se registra esta consulta.
        paciente_nombre:
          type: string
          readOnly: true
        ficha_correlativo:
          type: string
          readOnly: true
        paciente_edad:
          type: integer
          nullable: true
          readOnly: true
        paciente_genero:
          type: string
          readOnly: true
        medico:
          type: integer
          readOnly: true
          title: Médico
          description: Médico que realizó la consulta.
        triaje:
          type: integer
          nullable: true
          description: Triaje previo asociado a esta consulta. Opcional si no pasó
            por triaje.
        estado:
          allOf:
          - $ref: '#/components/schemas/ConsultaEstadoEnum'
          readOnly: true
          description: |-
            Ciclo de vida: BORRADOR (en edición) → COMPLETADA (lista) → FIRMADA (con firma digital).

            * `BORRADOR` - Borrador
            * `COMPLETADA` - Completada
            * `FIRMADA` - Firmada
        motivo_consulta:
          type: string
          default: ''
        historia_enfermedad_actual:
          type: string
          default: ''
        examen_fisico:
          type: string
          title: Examen físico
          description: 'SOAP-O: Hallazgos del examen físico por sistemas. Ej: Abdomen:
            dolor en FID a la palpación.'
        impresion_diagnostica:
          type: string
          default: ''
        codigo_cie10_principal:
          type: string
          default: ''
        codigo_cie10_secundario:
          type: string
          title: Código CIE-10 secundario
          description: 'Diagnóstico secundario: complicación o comorbilidad relevante.
            Opcional.'
          maxLength: 10
        descripcion_cie10:
          type: string
          title: Descripción del diagnóstico CIE-10
          description: Descripción textual del código CIE-10 principal para lectura
            rápida.
          maxLength: 300
        plan_tratamiento:
          type: string
          title: Plan de tratamiento
          description: 'SOAP-P: Indicaciones, tratamiento no farmacológico, seguimiento
            y controles.'
        indicaciones_alta:
          type: string
          title: Indicaciones al alta
          description: Instrucciones entregadas al paciente al momento de salir del
            establecimiento.
        requiere_derivacion:
          type: boolean
          title: Requiere derivación
          description: True si el paciente necesita ser atendido en otro nivel de
            atención.
        derivacion_destino:
          type: string
          title: Destino de derivación
          description: 'Establecimiento o especialidad a donde se deriva. Ej: Hospital
            de 2do nivel, Cardiología.'
          maxLength: 200
        derivacion_motivo:
          type: string
          title: Motivo de derivación
          description: Justificación clínica de por qué se deriva al paciente.
        hash_documento:
          type: string
          readOnly: true
          title: Hash del documento
          description: SHA-256 del contenido de la consulta. Vacío hasta que el médico
            firma. Se ancla en blockchain.
        firmada_por:
          type: integer
          readOnly: true
          nullable: true
          description: Médico que firmó digitalmente la consulta. Nulo hasta que se
            firme.
        firmada_por_nombre:
          type: string
          readOnly: true
        firmada_en:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: Timestamp de cuándo se realizó la firma digital.
        creado_en:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp automático de creación de la consulta.
        actualizado_en:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp automático de la última modificación.
      required:
      - actualizado_en
      - creado_en
      - estado
      - ficha
      - ficha_correlativo
      - firmada_en
      - firmada_por
      - firmada_por_nombre
      - hash_documento
      - id
      - medico
      - paciente_edad
      - paciente_genero
      - paciente_nombre
