        observaciones:
          type: string
          description: Observaciones adicionales de enfermería durante el triaje.
        nivel_sugerido_ia:
          nullable: true
          title: Nivel sugerido por IA
          description: |-
            Nivel que el modelo ML sugirió antes de la confirmación de enfermería.

            * `ROJO` - Rojo - Inmediato
            * `NARANJA` - Naranja - Muy urgente
            * `AMARILLO` - Amarillo - Urgente
            * `VERDE` - Verde - Poco urgente
            * `AZUL` - Azul - No urgente
          oneOf:
          - $ref: '#/components/schemas/NivelSugeridoIaEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        nivel_urgencia:
          nullable: true
          title: Nivel de urgencia final
          description: |-
            Nivel confirmado. Igual al sugerido por IA salvo que enfermería lo haya sobreescrito.

            * `ROJO` - Rojo - Inmediato
            * `NARANJA` - Naranja - Muy urgente
            * `AMARILLO` - Amarillo - Urgente
            * `VERDE` - Verde - Poco urgente
            * `AZUL` - Azul - No urgente
          oneOf:
          - $ref: '#/components/schemas/NivelUrgenciaB87Enum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        fue_sobreescrito:
          type: boolean
          title: Sobreescrito por enfermería
          description: True si la enfermera cambió el nivel sugerido por la IA.
        justificacion_override:
          type: string
          title: Justificación del cambio
          description: Obligatorio cuando fue_sobreescrito=True. Queda en auditoría.
        reglas_duras_aplicadas:
          type: boolean
          description: True si el modelo forzó un nivel por SpO₂, PA o Glasgow críticos.
        hora_triaje:
          type: string
          format: date-time
          readOnly: true
          title: Hora de triaje
          description: Timestamp automático de cuándo se realizó el triaje.
        imc:
          type: string
          readOnly: true
        presion_arterial:
          type: string
          readOnly: true
      required:
      - enfermera
      - ficha
      - ficha_detail
      - hora_triaje
      - id
      - imc
      - presion_arterial
    TriajeRequest:
      type: object
      description: |-
        Paso 2 del flujo de dos pasos.
        Recibe el triaje completo con el nivel ya confirmado por enfermería.
      properties:
        ficha:
          type: integer
        peso_kg:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
          nullable: true
          title: Peso (kg)
          description: 'Peso del paciente en kilogramos. Rango válido: 0.5 – 500 kg.'
        talla_cm:
          type: string
          format: decimal
          pattern: ^-?\d{0,4}(?:\.\d{0,1})?$
          nullable: true
          title: Talla (cm)
          description: 'Talla del paciente en centímetros. Rango válido: 20 – 250
            cm.'
        frecuencia_cardiaca:
          type: integer
          maximum: 300
          minimum: 20
          nullable: true
          title: Frecuencia cardíaca (lpm)
          description: 'Latidos por minuto. Rango válido: 20 – 300 lpm.'
        frecuencia_respiratoria:
          type: integer
          maximum: 80
          minimum: 5
          nullable: true
          title: Frecuencia respiratoria (rpm)
          description: 'Respiraciones por minuto. Rango válido: 5 – 80 rpm.'
        presion_sistolica:
          type: integer
          maximum: 300
          minimum: 40
          nullable: true
          title: Presión sistólica (mmHg)
          description: 'Número de arriba en la presión arterial. Rango válido: 40
            – 300 mmHg.'
        presion_diastolica:
          type: integer
          maximum: 200
          minimum: 20
          nullable: true
          title: Presión diastólica (mmHg)
          description: 'Número de abajo en la presión arterial. Rango válido: 20 –
            200 mmHg.'
        temperatura_celsius:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,1})?$
          nullable: true
          title: Temperatura (°C)
          description: 'Temperatura corporal en grados Celsius. Rango válido: 25 –
            45 °C.'
        saturacion_oxigeno:
          type: integer
          maximum: 100
          minimum: 50
          nullable: true
          title: Saturación de oxígeno (SpO2 %)
          description: 'Saturación de oxígeno en sangre. Rango válido: 50 – 100 %.
            Normal > 95%.'
        glucemia:
          type: string
          format: decimal
          pattern: ^-?\d{0,5}(?:\.\d{0,1})?$
          nullable: true
          title: Glucemia capilar (mg/dL)
          description: Glucosa en sangre capilar en mg/dL. Solo si aplica clínicamente.
        escala_dolor:
          type: integer
          maximum: 10
          minimum: 0
          nullable: true
          title: Escala de dolor EVA
          description: 'Escala Visual Analógica: 0 = sin dolor, 10 = dolor máximo
            insoportable.'
        glasgow:
          type: integer
          maximum: 15
          minimum: 3
          nullable: true
          title: Escala de Glasgow
          description: 'Escala de coma de Glasgow: 3 (coma profundo) – 15 (normal).'
        motivo_consulta_triaje:
          type: string
          title: Motivo de consulta (triaje)
          description: Resumen del motivo de consulta anotado por enfermería. Este
            texto es procesado por el modelo NLP de triaje.
        observaciones:
          type: string
          description: Observaciones adicionales de enfermería durante el triaje.
        nivel_sugerido_ia:
          nullable: true
          title: Nivel sugerido por IA
          description: |-
            Nivel que el modelo ML sugirió antes de la confirmación de enfermería.

            * `ROJO` - Rojo - Inmediato
            * `NARANJA` - Naranja - Muy urgente
            * `AMARILLO` - Amarillo - Urgente
            * `VERDE` - Verde - Poco urgente
            * `AZUL` - Azul - No urgente
          oneOf:
          - $ref: '#/components/schemas/NivelSugeridoIaEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        nivel_urgencia:
          nullable: true
          title: Nivel de urgencia final
          description: |-
            Nivel confirmado. Igual al sugerido por IA salvo que enfermería lo haya sobreescrito.

            * `ROJO` - Rojo - Inmediato
            * `NARANJA` - Naranja - Muy urgente
            * `AMARILLO` - Amarillo - Urgente
            * `VERDE` - Verde - Poco urgente
            * `AZUL` - Azul - No urgente
          oneOf:
          - $ref: '#/components/schemas/NivelUrgenciaB87Enum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        fue_sobreescrito:
          type: boolean
          title: Sobreescrito por enfermería
          description: True si la enfermera cambió el nivel sugerido por la IA.
        justificacion_override:
          type: string
          title: Justificación del cambio
          description: Obligatorio cuando fue_sobreescrito=True. Queda en auditoría.
        reglas_duras_aplicadas:
          type: boolean
          description: True si el modelo forzó un nivel por SpO₂, PA o Glasgow críticos.
      required:
      - ficha
    ViaAdministracionEnum:
      enum:
      - VO
      - IV
      - IM
      - SC
      - TOP
      - INH
      - SL
      - REC
      - OFT
      - OTR
      type: string
      description: |-
        * `VO` - Vía oral
        * `IV` - Intravenosa
        * `IM` - Intramuscular
        * `SC` - Subcutánea
        * `TOP` - Tópica
        * `INH` - Inhalatoria
        * `SL` - Sublingual
        * `REC` - Rectal
        * `OFT` - Oftálmica
        * `OTR` - Otra
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
