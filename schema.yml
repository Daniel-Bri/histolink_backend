        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Triaje'
          description: ''
  /api/triaje/clasificar/:
    post:
      operationId: api_triaje_clasificar_create
      description: |-
        Clasifica con IA sin guardar en BD.
        El frontend muestra el nivel sugerido a la enfermera para que confirme o cambie.
      tags:
