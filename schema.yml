          description: |-
            Ruta por la que se administra el medicamento. VO = vía oral (más común).

            * `VO` - Vía oral
            * `IV` - Intravenosa
            * `IM` - Intramuscular
            * `SC` - Subcutánea
            * `TOP` - Tópica
            * `INH` - Inhalatoria
            * `SL` - Sublingual
            * `REC` - Rectal
            * `OFT` - Oftálmica
            * `OTR` - Otra
        dosis:
          type: string
          description: 'Cantidad a administrar por toma. Ej: 1 tableta, 5ml, 500mg.'
          maxLength: 100
        frecuencia:
          type: string
          description: 'Cada cuánto se toma. Ej: cada 8 horas, 3 veces al día, una
            vez al día.'
          maxLength: 100
        duracion:
          type: string
          title: Duración
          description: 'Por cuánto tiempo. Ej: 7 días, 1 mes, hasta terminar.'
