          description: 'Escala Visual Analógica: 0 = sin dolor, 10 = dolor máximo
            insoportable.'
        glasgow:
          type: integer
          maximum: 15
          minimum: 3
          nullable: true
          title: Escala de Glasgow
          description: 'Escala de coma de Glasgow: 3 (coma profundo) – 15 (normal).'
